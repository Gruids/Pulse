<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pulse Messenger</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#0e1621; color:#fff; height:100vh; display:flex; }
    #sidebar { width:300px; background:#17212b; display:none; flex-direction:column; }
    #sidebar-header { padding:15px; background:#242f3d; display:flex; align-items:center; gap:10px; }
    .avatar { width:40px; height:40px; border-radius:50%; background:#2b5278; display:flex; align-items:center; justify-content:center; }
    #tabs { display:flex; border-bottom:1px solid #242f3d; }
    .tab-btn { flex:1; padding:10px; background:#17212b; border:none; color:#fff; cursor:pointer; }
    .tab-btn.active { background:#2b5278; }
    #search { padding:10px; }
    #search input { width:100%; padding:8px; border:none; border-radius:5px; background:#242f3d; color:#fff; }
    #chat-list, #user-list { flex:1; overflow-y:auto; }
    .list-item { padding:12px 15px; cursor:pointer; display:flex; gap:10px; align-items:center; }
    .list-item:hover { background:#242f3d; }
    .list-item.active { background:#2b5278; }
    #main { flex:1; display:none; flex-direction:column; }
    #chat-header { padding:15px; background:#242f3d; display:flex; align-items:center; gap:10px; }
    #messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .msg { max-width:60%; padding:8px 12px; border-radius:8px; background:#182633; }
    .msg.self { background:#2b5278; align-self:flex-end; }
    .msg .author { font-size:12px; color:#5eb5f7; margin-bottom:4px; }
    .msg .time { font-size:11px; color:#aaa; float:right; margin-left:10px; }
    #input-area { padding:10px; background:#17212b; display:flex; gap:10px; }
    #input-area input { flex:1; padding:10px; border:none; border-radius:5px; background:#242f3d; color:#fff; }
    #input-area button { padding:10px 20px; border:none; border-radius:5px; background:#2b5278; color:#fff; cursor:pointer; }
    #auth { position:fixed; inset:0; background:#0e1621; display:flex; justify-content:center; align-items:center; }
    .auth-form { background:#17212b; padding:30px; border-radius:10px; width:320px; }
    .auth-form h2 { margin-bottom:20px; text-align:center; }
    .auth-form input { width:100%; padding:10px; margin:10px 0; border:none; border-radius:5px; background:#242f3d; color:#fff; }
    .auth-form button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:5px; background:#2b5278; color:#fff; cursor:pointer; }
  </style>
</head>
<body>
  <div id="auth">
    <div class="auth-form">
      <div class="tab">
        <button class="active" onclick="showTab('login', this)">Вход</button>
        <button onclick="showTab('reg', this)">Регистрация</button>
      </div>
      <div id="login-tab">
        <input id="login-user" placeholder="Email">
        <input id="login-pass" type="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
      </div>
      <div id="reg-tab" style="display:none">
        <input id="reg-user" placeholder="Email">
        <input id="reg-pass" type="password" placeholder="Пароль (мин 6 символов)">
        <button onclick="register()">Зарегистрироваться</button>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <div class="avatar" id="user-avatar"></div>
      <span id="user-name"></span>
    </div>
    <div id="tabs">
      <button class="tab-btn active" onclick="switchTab('chats', this)">Чаты</button>
      <button class="tab-btn" onclick="switchTab('users', this)">Люди</button>
    </div>
    <div id="search"><input placeholder="Поиск..." oninput="filterItems(this.value)"></div>
    <div id="chat-list">
      <div class="list-item active" onclick="openGeneralChat()">
        <div class="avatar">O</div>
        <div>Общий чат</div>
      </div>
    </div>
    <div id="user-list" style="display:none"></div>
  </div>

  <div id="main">
    <div id="chat-header">
      <div class="avatar"></div>
      <span id="chat-title">Общий чат</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">Отправить</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCyKQ5hrVFikcnL2Z_dnlHYt6G0ZgqZZoQ",
      authDomain: "pulse-f91f7.firebaseapp.com",
      databaseURL: "https://pulse-f91f7-default-rtdb.firebaseio.com",
      projectId: "pulse-f91f7",
      storageBucket: "pulse-f91f7.firebasestorage.app",
      messagingSenderId: "385531673294",
      appId: "1:385531673294:web:11ca96153d2b07ccb2ae9f",
      measurementId: "G-X61NV7817J"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const authDiv = document.getElementById('auth');
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    const userName = document.getElementById('user-name');
    const userAvatar = document.getElementById('user-avatar');
    const messages = document.getElementById('messages');
    const chatList = document.getElementById('chat-list');
    const userList = document.getElementById('user-list');
    const chatTitle = document.getElementById('chat-title');
    let currentUser = null;
    let currentChatId = 'general';
    let currentChatType = 'general';

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (tab === 'chats') {
        chatList.style.display = 'block';
        userList.style.display = 'none';
      } else {
        chatList.style.display = 'none';
        userList.style.display = 'block';
        loadUsers();
      }
    }

    function loadUsers() {
      userList.innerHTML = 'Загрузка...';
      db.ref('users').once('value')
        .then(snapshot => {
          userList.innerHTML = '';
          if (!snapshot.exists()) {
            userList.innerHTML = '<div class="list-item">Нет пользователей</div>';
            return;
          }
          snapshot.forEach(child => {
            const user = child.val();
            if (user.email === currentUser.email) return;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div class="avatar">${user.email[0].toUpperCase()}</div><div>${user.email}</div>`;
            div.onclick = () => openPrivateChat(child.key, user.email);
            userList.appendChild(div);
          });
        })
        .catch(e => {
          userList.innerHTML = 'Ошибка: ' + e.message;
          console.error('Load users error:', e);
        });
    }

    function openPrivateChat(uid, email) {
      const ids = [currentUser.uid, uid].sort();
      const chatId = ids.join('_');
      currentChatId = chatId;
      currentChatType = 'private';
      chatTitle.textContent = email;
      messages.innerHTML = '';
      loadMessages();
      document.querySelectorAll('#user-list .list-item').forEach(el => el.classList.remove('active'));
      event.target.closest('.list-item').classList.add('active');
    }

    function openGeneralChat() {
      currentChatId = 'general';
      currentChatType = 'general';
      chatTitle.textContent = 'Общий чат';
      messages.innerHTML = '';
      loadMessages();
    }

    function showTab(tab, btn) {
      document.getElementById('login-tab').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('reg-tab').style.display = tab === 'reg' ? 'block' : 'none';
      document.querySelectorAll('.auth-form .tab button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function register() {
      const email = document.getElementById('reg-user').value;
      const pass = document.getElementById('reg-pass').value;
      auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
          const user = userCredential.user;
          return db.ref('users/' + user.uid).set({
            email: user.email,
            uid: user.uid,
            createdAt: new Date().toISOString()
          }).then(() => {
            alert('Регистрация успешна! UID: ' + user.uid);
          });
        })
        .catch(e => alert('Ошибка регистрации: ' + e.message));
    }

    function login() {
      const email = document.getElementById('login-user').value;
      const pass = document.getElementById('login-pass').value;
      auth.signInWithEmailAndPassword(email, pass)
        .catch(e => alert('Ошибка: ' + e.message));
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        authDiv.style.display = 'none';
        sidebar.style.display = 'flex';
        main.style.display = 'flex';
        userName.textContent = user.email;
        userAvatar.textContent = user.email[0].toUpperCase();
        loadMessages();
      }
    });

    function sendMsg() {
      const text = document.getElementById('msg-input').value;
      if (!text || !currentUser) return;
      db.ref('messages/' + currentChatId).push({
        user: currentUser.email,
        userId: currentUser.uid,
        text: text,
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      });
      document.getElementById('msg-input').value = '';
    }

    function loadMessages() {
      db.ref('messages/' + currentChatId).off();
      messages.innerHTML = '';
      db.ref('messages/' + currentChatId).on('child_added', snapshot => {
        const msg = snapshot.val();
        const div = document.createElement('div');
        div.className = 'msg' + (msg.user === currentUser.email ? ' self' : '');
        div.innerHTML = `<div class="author">${msg.user}</div>${msg.text}<span class="time">${msg.time}</span>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }, e => console.error('Load messages error:', e));
    }

    function filterItems(q) {
      const items = document.querySelectorAll('#chat-list .list-item, #user-list .list-item');
      items.forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none';
      });
    }
  </script>
</body>
</html>
