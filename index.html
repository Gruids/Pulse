<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pulse Messenger</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#0e1621; color:#fff; height:100vh; display:flex; }
    #sidebar { width:300px; background:#17212b; display:none; flex-direction:column; }
    #sidebar-header { padding:15px; background:#242f3d; display:flex; align-items:center; gap:10px; }
    .avatar { width:40px; height:40px; border-radius:50%; background:#2b5278; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold; }
    #search { padding:10px; }
    #search input { width:100%; padding:8px; border:none; border-radius:5px; background:#242f3d; color:#fff; }
    #chat-list { flex:1; overflow-y:auto; }
    .list-item { padding:12px 15px; cursor:pointer; display:flex; gap:10px; align-items:center; }
    .list-item:hover { background:#242f3d; }
    .list-item.active { background:#2b5278; }
    #search-results { max-height:200px; overflow-y:auto; background:#1e2c3a; border-radius:5px; margin-top:5px; display:none; }
    #search-results .list-item { font-size:14px; }
    #search-results .list-item:active { background:#2b5278; }
    #main { flex:1; display:none; flex-direction:column; }
    #chat-header { padding:15px; background:#242f3d; display:flex; align-items:center; gap:10px; }
    #messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .msg { max-width:60%; padding:8px 12px; border-radius:8px; background:#182633; }
    .msg.self { background:#2b5278; align-self:flex-end; }
    .msg .author { font-size:12px; color:#5eb5f7; margin-bottom:4px; }
    .msg .time { font-size:11px; color:#aaa; float:right; margin-left:10px; }
    #input-area { padding:10px; background:#17212b; display:flex; gap:10px; }
    #input-area input { flex:1; padding:10px; border:none; border-radius:5px; background:#242f3d; color:#fff; }
    #input-area button { padding:10px 20px; border:none; border-radius:5px; background:#2b5278; color:#fff; cursor:pointer; }
    #auth { position:fixed; inset:0; background:#0e1621; display:flex; justify-content:center; align-items:center; }
    .auth-form { background:#17212b; padding:30px; border-radius:10px; width:340px; }
    .auth-form h2 { margin-bottom:15px; text-align:center; font-size:20px; }
    .auth-form input { width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; background:#242f3d; color:#fff; font-size:15px; text-align:center; }
    .auth-form button { width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; background:#2b5278; color:#fff; cursor:pointer; font-size:15px; font-weight:bold; }
    .auth-form button:disabled { opacity:0.5; cursor:not-allowed; }
    .auth-form .tab { display:flex; margin-bottom:15px; }
    .auth-form .tab button { flex:1; margin:0; border-radius:8px 8px 0 0; background:#242f3d; font-size:14px; font-weight:bold; }
    .auth-form .tab button.active { background:#2b5278; }
    .field-group { margin:8px 0; }
    .field-group label { font-size:13px; color:#8899a6; display:block; margin-bottom:4px; }
    .auth-step { display:none; }
    .auth-step.active { display:block; }
    .back-btn { background:none; border:none; color:#5eb5f7; cursor:pointer; font-size:13px; margin-bottom:10px; display:block; }
    .back-btn:hover { color:#fff; }
    #recaptcha-container { margin:10px auto; }
    .timer { text-align:center; color:#8899a6; font-size:13px; margin:5px 0; }
  </style>
</head>
<body>
  <div id="auth">
    <div class="auth-form">
      <!-- Step 1: Choose login or register -->
      <div id="step-choose" class="auth-step active">
        <h2>Pulse</h2>
        <div class="tab">
          <button class="active" onclick="chooseTab('login', this)">Вход</button>
          <button onclick="chooseTab('reg', this)">Регистрация</button>
        </div>

        <div id="choose-login">
          <div class="field-group">
            <label>Номер телефона</label>
            <input id="login-phone" placeholder="+79001234567" type="tel">
          </div>
          <button onclick="sendLoginCode()">Получить код</button>
        </div>

        <div id="choose-reg" style="display:none">
          <div class="field-group">
            <label>Номер телефона</label>
            <input id="reg-phone" placeholder="+79001234567" type="tel">
          </div>
          <div class="field-group">
            <label>Имя пользователя</label>
            <input id="reg-username" placeholder="username (латиница, цифры, _)">
          </div>
          <button onclick="sendRegCode()">Получить код</button>
        </div>
      </div>

      <!-- Step 2: Enter SMS code -->
      <div id="step-code" class="auth-step">
        <button class="back-btn" onclick="backToChoose()">← Назад</button>
        <h2>Введите код из SMS</h2>
        <p id="code-sent-to" style="text-align:center; color:#8899a6; margin-bottom:15px; font-size:14px;"></p>
        <input id="sms-code" placeholder="000000" maxlength="6" type="tel">
        <div class="timer" id="resend-timer"></div>
        <button id="verify-btn" onclick="verifyCode()">Подтвердить</button>
        <button onclick="resendCode()" id="resend-btn" style="display:none; background:#242f3d; font-weight:normal;">Отправить код повторно</button>
        <div id="recaptcha-container"></div>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <div class="avatar" id="user-avatar"></div>
      <span id="user-name"></span>
      <button onclick="logout()" style="margin-left:auto; background:#242f3d; color:#fff; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Выход</button>
    </div>
    <div id="search">
      <input placeholder="Поиск по имени или телефону..." oninput="searchUsers(this.value)">
      <div id="search-results"></div>
    </div>
    <div id="chat-list">
      <div class="list-item active" onclick="openGeneralChat()">
        <div class="avatar">O</div>
        <div>Общий чат</div>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="chat-header">
      <div class="avatar"></div>
      <span id="chat-title">Общий чат</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">Отправить</button>
    </div>
  </div>

  <div id="recaptcha-container"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCyKQ5hrVFikcnL2Z_dnlHYt6G0ZgqZZoQ",
      authDomain: "pulse-f91f7.firebaseapp.com",
      databaseURL: "https://pulse-f91f7-default-rtdb.firebaseio.com",
      projectId: "pulse-f91f7",
      storageBucket: "pulse-f91f7.firebasestorage.app",
      messagingSenderId: "385531673294",
      appId: "1:385531673294:web:11ca96153d2b07ccb2ae9f",
      measurementId: "G-X61NV7817J"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const authDiv = document.getElementById('auth');
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    const userName = document.getElementById('user-name');
    const userAvatar = document.getElementById('user-avatar');
    const messages = document.getElementById('messages');
    const chatList = document.getElementById('chat-list');
    const searchResults = document.getElementById('search-results');
    const chatTitle = document.getElementById('chat-title');

    let currentUser = null;
    let currentUserData = null;
    let currentChatId = 'general';
    let currentChatType = 'general';
    let confirmationResult = null;
    let currentAuthMode = null;
    let regData = null;
    let resendTimerInterval = null;

    function normalizePhone(phone) {
      return phone.replace(/[^0-9+]/g, '');
    }

    function chooseTab(tab, btn) {
      document.querySelectorAll('.auth-form .tab button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('choose-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('choose-reg').style.display = tab === 'reg' ? 'block' : 'none';
    }

    function showStep(step) {
      document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-' + step).classList.add('active');
    }

    function backToChoose() {
      showStep('choose');
      clearResendTimer();
    }

    function startResendTimer() {
      let seconds = 30;
      const timerEl = document.getElementById('resend-timer');
      const resendBtn = document.getElementById('resend-btn');
      resendBtn.style.display = 'none';
      timerEl.textContent = 'Отправить повторно через ' + seconds + 'с';
      clearResendTimer();
      resendTimerInterval = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearResendTimer();
          timerEl.textContent = '';
          resendBtn.style.display = 'block';
        } else {
          timerEl.textContent = 'Отправить повторно через ' + seconds + 'с';
        }
      }, 1000);
    }

    function clearResendTimer() {
      if (resendTimerInterval) {
        clearInterval(resendTimerInterval);
        resendTimerInterval = null;
      }
    }

    async function sendLoginCode() {
      const phone = document.getElementById('login-phone').value.trim();
      if (!phone || phone.length < 10) { alert('Введите корректный номер телефона'); return; }

      try {
        const normalized = normalizePhone(phone);
        const snap = await db.ref('phoneIndex/' + normalized).once('value');
        if (!snap.exists()) {
          alert('Этот номер не зарегистрирован. Сначала создайте аккаунт.');
          return;
        }

        const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
          size: 'invisible'
        });

        const result = await auth.signInWithPhoneNumber(phone, appVerifier);
        confirmationResult = result;
        currentAuthMode = 'login';
        document.getElementById('code-sent-to').textContent = 'Код отправлен на ' + phone;
        document.getElementById('sms-code').value = '';
        showStep('code');
        startResendTimer();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function sendRegCode() {
      const phone = document.getElementById('reg-phone').value.trim();
      const username = document.getElementById('reg-username').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');

      if (!phone || phone.length < 10) { alert('Введите корректный номер телефона'); return; }
      if (!username || username.length < 3) { alert('Имя пользователя — минимум 3 символа (латиница, цифры, _)'); return; }

      try {
        const normalized = normalizePhone(phone);
        const phoneCheck = await db.ref('phoneIndex/' + normalized).once('value');
        if (phoneCheck.exists()) { alert('Этот номер уже зарегистрирован'); return; }

        const usernameCheck = await db.ref('usernameIndex/' + username).once('value');
        if (usernameCheck.exists()) { alert('Это имя пользователя уже занято'); return; }

        const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
          size: 'invisible'
        });

        const result = await auth.signInWithPhoneNumber(phone, appVerifier);
        confirmationResult = result;
        currentAuthMode = 'register';
        regData = { phone: phone, normalizedPhone: normalized, username: username };
        document.getElementById('code-sent-to').textContent = 'Код отправлен на ' + phone;
        document.getElementById('sms-code').value = '';
        showStep('code');
        startResendTimer();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function verifyCode() {
      const code = document.getElementById('sms-code').value.trim();
      if (!code || code.length < 4) { alert('Введите код из SMS'); return; }

      try {
        const result = await confirmationResult.confirm(code);
        const user = result.user;

        if (currentAuthMode === 'register') {
          await db.ref('users/' + user.uid).set({
            phone: regData.phone,
            username: regData.username,
            uid: user.uid,
            createdAt: new Date().toISOString()
          });
          await db.ref('phoneIndex/' + regData.normalizedPhone).set(user.uid);
          await db.ref('usernameIndex/' + regData.username).set(user.uid);
          regData = null;
        } else if (currentAuthMode === 'login') {
          const snap = await db.ref('users/' + user.uid).once('value');
          if (!snap.exists()) {
            alert('Ошибка: профиль не найден');
            await auth.signOut();
            return;
          }
        }

        clearResendTimer();
        showStep('choose');
      } catch (e) {
        alert('Неверный код. Попробуйте ещё раз.');
      }
    }

    async function resendCode() {
      const phone = currentAuthMode === 'register' ? regData.phone : document.getElementById('login-phone').value.trim();
      try {
        const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
          size: 'invisible'
        });
        const result = await auth.signInWithPhoneNumber(phone, appVerifier);
        confirmationResult = result;
        startResendTimer();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function searchUsers(query) {
      if (!query || query.length < 2) {
        searchResults.style.display = 'none';
        searchResults.innerHTML = '';
        return;
      }

      const q = query.trim().toLowerCase();
      const results = [];

      try {
        if (/^[a-z0-9_]/.test(q)) {
          const allUsernames = await db.ref('usernameIndex').once('value');
          if (allUsernames.exists()) {
            const promises = [];
            allUsernames.forEach(child => {
              if (child.key.startsWith(q)) {
                const uid = child.val();
                if (uid !== (currentUser && currentUser.uid)) {
                  promises.push(db.ref('users/' + uid).once('value').then(s => s.exists() ? s.val() : null));
                }
              }
            });
            const users = await Promise.all(promises);
            users.filter(Boolean).forEach(u => results.push(u));
          }
        }

        const normQ = normalizePhone(q);
        if (/^[0-9+]/.test(normQ) && normQ.length >= 4) {
          const allPhones = await db.ref('phoneIndex').once('value');
          if (allPhones.exists()) {
            const promises = [];
            allPhones.forEach(child => {
              if (child.key.includes(normQ)) {
                const uid = child.val();
                if (uid !== (currentUser && currentUser.uid)) {
                  promises.push(db.ref('users/' + uid).once('value').then(s => s.exists() ? s.val() : null));
                }
              }
            });
            const users = await Promise.all(promises);
            users.filter(Boolean).forEach(u => {
              if (!results.find(r => r.uid === u.uid)) results.push(u);
            });
          }
        }

        renderSearchResults(results);
      } catch (e) {
        console.error('Search error:', e);
      }
    }

    function renderSearchResults(results) {
      if (results.length === 0) {
        searchResults.style.display = 'none';
        searchResults.innerHTML = '';
        return;
      }

      searchResults.style.display = 'block';
      searchResults.innerHTML = '';

      results.forEach(u => {
        const div = document.createElement('div');
        div.className = 'list-item';
        const displayName = u.username ? '@' + u.username : u.phone;
        const initial = (u.username || u.phone)[0].toUpperCase();
        div.innerHTML = `<div class="avatar">${initial}</div><div><div>${displayName}</div><div style="font-size:11px;color:#8899a6">${u.phone || ''}</div></div>`;
        div.onclick = () => {
          openPrivateChat(u.uid, displayName);
          searchResults.style.display = 'none';
          searchResults.innerHTML = '';
          document.querySelector('#search input').value = '';
        };
        searchResults.appendChild(div);
      });
    }

    function openPrivateChat(uid, displayName) {
      const ids = [currentUser.uid, uid].sort();
      const chatId = ids.join('_');
      currentChatId = chatId;
      currentChatType = 'private';
      chatTitle.textContent = displayName;
      messages.innerHTML = '';
      loadMessages();

      const existing = document.querySelector(`#chat-list[data-uid="${uid}"]`);
      if (!existing) {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.setAttribute('data-uid', uid);
        const initial = displayName[0].toUpperCase();
        div.innerHTML = `<div class="avatar">${initial}</div><div>${displayName}</div>`;
        div.onclick = () => openPrivateChat(uid, displayName);
        chatList.appendChild(div);
      }

      document.querySelectorAll('#chat-list .list-item').forEach(el => el.classList.remove('active'));
      const target = document.querySelector(`#chat-list[data-uid="${uid}"]`);
      if (target) target.classList.add('active');
    }

    function openGeneralChat() {
      currentChatId = 'general';
      currentChatType = 'general';
      chatTitle.textContent = 'Общий чат';
      messages.innerHTML = '';
      loadMessages();
      document.querySelectorAll('#chat-list .list-item').forEach(el => el.classList.remove('active'));
      chatList.querySelector('.list-item').classList.add('active');
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        const snap = await db.ref('users/' + user.uid).once('value');
        if (snap.exists()) currentUserData = snap.val();

        authDiv.style.display = 'none';
        sidebar.style.display = 'flex';
        main.style.display = 'flex';

        const displayName = currentUserData && currentUserData.username ? '@' + currentUserData.username : user.phoneNumber;
        userName.textContent = displayName;
        userAvatar.textContent = (currentUserData && currentUserData.username ? currentUserData.username : user.phoneNumber).replace('+', '')[0].toUpperCase();
        loadMessages();
      } else {
        currentUser = null;
        currentUserData = null;
      }
    });

    function sendMsg() {
      const text = document.getElementById('msg-input').value;
      if (!text || !currentUser) return;
      const displayName = currentUserData && currentUserData.username ? '@' + currentUserData.username : currentUser.phoneNumber;
      db.ref('messages/' + currentChatId).push({
        user: displayName,
        userId: currentUser.uid,
        text: text,
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      });
      document.getElementById('msg-input').value = '';
    }

    function loadMessages() {
      db.ref('messages/' + currentChatId).off();
      messages.innerHTML = '';
      db.ref('messages/' + currentChatId).on('child_added', snapshot => {
        const msg = snapshot.val();
        const div = document.createElement('div');
        div.className = 'msg' + (msg.userId === currentUser.uid ? ' self' : '');
        div.innerHTML = `<div class="author">${msg.user}</div>${msg.text}<span class="time">${msg.time}</span>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }, e => console.error('Load messages error:', e));
    }

    function logout() {
      auth.signOut().then(() => {
        currentUser = null;
        currentUserData = null;
        sidebar.style.display = 'none';
        main.style.display = 'none';
        authDiv.style.display = 'flex';
        chatList.innerHTML = `<div class="list-item active" onclick="openGeneralChat()"><div class="avatar">O</div><div>Общий чат</div></div>`;
        showStep('choose');
      });
    }
  </script>
</body>
</html>
