<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мессенджер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0e1621; color: #fff; height: 100vh; display: flex; }
    #sidebar { width: 300px; background: #17212b; display: flex; flex-direction: column; }
    #sidebar-header { padding: 15px; background: #242f3d; display: flex; align-items: center; gap: 10px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2b5278; display: flex; align-items: center; justify-content: center; }
    #search { padding: 10px; background: #17212b; }
    #search input { width: 100%; padding: 8px; border: none; border-radius: 5px; background: #242f3d; color: #fff; }
    #chat-list { flex: 1; overflow-y: auto; }
    .chat-item { padding: 12px 15px; cursor: pointer; display: flex; gap: 10px; }
    .chat-item:hover { background: #242f3d; }
    .chat-item.active { background: #2b5278; }
    #main { flex: 1; display: flex; flex-direction: column; }
    #chat-header { padding: 15px; background: #242f3d; display: flex; align-items: center; gap: 10px; }
    #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 60%; padding: 8px 12px; border-radius: 8px; background: #182633; }
    .msg.self { background: #2b5278; align-self: flex-end; }
    .msg .author { font-size: 12px; color: #5eb5f7; margin-bottom: 4px; }
    .msg .time { font-size: 11px; color: #aaa; float: right; margin-left: 10px; }
    #input-area { padding: 10px; background: #17212b; display: flex; gap: 10px; }
    #input-area input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #242f3d; color: #fff; }
    #input-area button { padding: 10px 20px; border: none; border-radius: 5px; background: #2b5278; color: #fff; cursor: pointer; }
    #auth { position: fixed; inset: 0; background: #0e1621; display: flex; justify-content: center; align-items: center; }
    .auth-form { background: #17212b; padding: 30px; border-radius: 10px; width: 320px; }
    .auth-form h2 { margin-bottom: 20px; text-align: center; }
    .auth-form input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background: #242f3d; color: #fff; }
    .auth-form button { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 5px; background: #2b5278; color: #fff; cursor: pointer; }
    .tab { display: flex; margin-bottom: 15px; }
    .tab button { flex: 1; background: #242f3d; }
    .tab button.active { background: #2b5278; }
  </style>
</head>
<body>
  <div id="auth">
    <div class="auth-form">
      <div class="tab">
        <button class="active" onclick="showTab('login')">Вход</button>
        <button onclick="showTab('reg')">Регистрация</button>
      </div>
      <div id="login-tab">
        <input id="login-user" placeholder="Email">
        <input id="login-pass" type="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
      </div>
      <div id="reg-tab" style="display:none">
        <input id="reg-user" placeholder="Email">
        <input id="reg-pass" type="password" placeholder="Пароль (мин 6 символов)">
        <button onclick="register()">Зарегистрироваться</button>
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">
      <div class="avatar" id="user-avatar"></div>
      <span id="user-name"></span>
    </div>
    <div id="search"><input placeholder="Поиск" oninput="filterChats(this.value)"></div>
    <div id="chat-list"></div>
  </div>

  <div id="main">
    <div id="chat-header">
      <div class="avatar"></div>
      <span id="chat-title">Выберите чат</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">Отправить</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCyKQ5hrVFikcnL2Z_dnlHYt6G0ZgqZZoQ",
      authDomain: "pulse-f91f7.firebaseapp.com",
      projectId: "pulse-f91f7",
      storageBucket: "pulse-f91f7.firebasestorage.app",
      messagingSenderId: "385531673294",
      appId: "1:385531673294:web:11ca96153d2b07ccb2ae9f",
      measurementId: "G-X61NV7817J"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    const authDiv = document.getElementById('auth');
    let currentUser = null;

    function showTab(tab) {
      document.getElementById('login-tab').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('reg-tab').style.display = tab === 'reg' ? 'block' : 'none';
      document.querySelectorAll('.tab button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    function register() {
      const email = document.getElementById('reg-user').value;
      const pass = document.getElementById('reg-pass').value;
      auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
          const user = userCredential.user;
          alert('Registered! UID: ' + user.uid);
          db.ref('users/' + user.uid).set({
            email: user.email,
            createdAt: new Date().toISOString()
          });
        })
        .catch(e => alert('Error: ' + e.message));
    }

    function login() {
      const email = document.getElementById('login-user').value;
      const pass = document.getElementById('login-pass').value;
      auth.signInWithEmailAndPassword(email, pass)
        .catch(e => alert(e.message));
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        authDiv.style.display = 'none';
        sidebar.style.display = 'flex';
        main.style.display = 'flex';
        userName.textContent = user.email;
        userAvatar.textContent = user.email[0].toUpperCase();
        loadMessages();
      }
    });

    function sendMsg() {
      const text = document.getElementById('msg-input').value;
      if (!text) return;
      db.ref('messages/general').push({
        user: currentUser.email,
        text: text,
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      });
      document.getElementById('msg-input').value = '';
    }

    function loadMessages() {
      db.ref('messages/general').on('child_added', snapshot => {
        const msg = snapshot.val();
        const div = document.createElement('div');
        div.className = 'msg' + (msg.user === currentUser.email ? ' self' : '');
        div.innerHTML = `<div class="author">${msg.user}</div>${msg.text}<span class="time">${msg.time}</span>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      });
    }

    function filterChats(q) {
      document.querySelectorAll('.chat-item').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q.toLowerCase()) ? 'flex' : 'none';
      });
    }
  </script>
</body>
</html>
