<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мессенджер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0e1621; color: #fff; height: 100vh; }
    #auth, #chat { display: none; height: 100%; }
    #auth.active, #chat.active { display: flex; }
    #auth { justify-content: center; align-items: center; }
    .form { background: #17212b; padding: 30px; border-radius: 10px; width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background: #242f3d; color: #fff; }
    button { width: 100%; padding: 10px; border: none; border-radius: 5px; background: #2b5278; color: #fff; cursor: pointer; }
    button:hover { background: #3a6d99; }
    #chat { flex-direction: column; }
    #sidebar { width: 300px; background: #17212b; padding: 10px; overflow-y: auto; }
    #messages { flex: 1; background: #0e1621; padding: 20px; overflow-y: auto; }
    .msg { margin: 10px 0; padding: 8px 12px; background: #182633; border-radius: 8px; max-width: 60%; }
    .msg.self { background: #2b5278; margin-left: auto; }
    #input-area { display: flex; padding: 10px; background: #17212b; }
    #input-area input { flex: 1; margin-right: 10px; }
  </style>
</head>
<body>
  <div id="auth" class="active">
    <div class="form">
      <h2>Вход / Регистрация</h2>
      <input id="username" placeholder="Логин">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="login()">Войти</button>
      <button onclick="register()">Регистрация</button>
    </div>
  </div>

  <div id="chat">
    <div id="sidebar">
      <h3>Чаты</h3>
      <div id="rooms">
        <div onclick="joinRoom('general')">Общий</div>
      </div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">Отправить</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket, currentUser, currentRoom = 'general';
    
    function login() {
      const u = username.value, p = password.value;
      fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p})
      }).then(r => r.json()).then(data => {
        if (data.id) startChat(data);
      });
    }

    function register() {
      const u = username.value, p = password.value;
      fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p})
      }).then(r => r.json()).then(data => {
        if (data.id) startChat(data);
      });
    }

    function startChat(user) {
      currentUser = user;
      auth.classList.remove('active');
      chat.classList.add('active');
      socket = io();
      joinRoom('general');
    }

    function joinRoom(room) {
      currentRoom = room;
      socket.emit('join', room);
      messages.innerHTML = '';
    }

    function sendMsg() {
      if (!msgInput.value) return;
      socket.emit('message', {
        user_id: currentUser.id,
        username: currentUser.username,
        text: msgInput.value,
        room: currentRoom
      });
      msgInput.value = '';
    }

    if (typeof io !== 'undefined') {
      socket.on('message', (data) => {
        const div = document.createElement('div');
        div.className = 'msg' + (data.user === currentUser?.username ? ' self' : '');
        div.innerHTML = `<b>${data.user}</b>: ${data.text} <small>${data.time}</small>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      });
    }
  </script>
</body>
</html>
